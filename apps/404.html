<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found · Chronos Toolbox</title>
  <link rel="icon" type="image/png" href="../../packages/images/white-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0B0A10;
      color: #F7F2F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      background: linear-gradient(135deg, #00F0FF, #FF7E9F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    p { color: #8E6B81; font-size: 0.95rem; margin-bottom: 2rem; }
    .home-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: #00F0FF;
      color: #0B0A10;
      font-size: 0.95rem; font-weight: 700;
      text-decoration: none;
      border-radius: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .home-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,240,255,0.25);
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The tool or page you're looking for doesn't exist or has been moved.</p>
  <a href="/apps/home/index.html" class="home-link">← Back to Chronos Toolbox</a>
</body>
</html>
