<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Translate text between 50+ languages instantly. Free, fast, and private. No account required." />
  <title>Text Translator · Chronos Toolbox</title>
  <link rel="icon" type="image/png" href="../../../../packages/images/white-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../tool-shared.css" />
  <style>
    .translator-container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: start;
    }
    .text-area-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .text-area {
      width: 100%;
      min-height: 250px;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: 1rem;
      color: var(--clr-text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: vertical;
    }
    .text-area:focus {
      outline: none;
      border-color: var(--c-rose);
    }
    .text-area[readonly] {
      background: var(--clr-surface-2);
      cursor: default;
    }
    .lang-select-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lang-select {
      flex: 1;
      font-family: inherit;
      font-size: 0.85rem;
      background: var(--clr-surface-2);
      color: var(--clr-text-primary);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem;
      outline: none;
      cursor: pointer;
    }
    .lang-select:focus {
      border-color: var(--c-rose);
    }
    .swap-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 50%;
      color: var(--c-rose);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .swap-btn:hover {
      background: var(--c-rose);
      color: var(--c-bg);
      border-color: var(--c-rose);
    }
    .middle-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding-top: 2rem;
    }
    .char-count {
      font-size: 0.75rem;
      color: var(--clr-text-muted);
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--clr-text-sub);
      margin-top: 0.5rem;
    }
    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      color: var(--clr-text-sub);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-icon:hover {
      color: var(--c-rose);
      border-color: var(--c-rose);
    }
    @media (max-width: 768px) {
      .translator-container {
        grid-template-columns: 1fr;
      }
      .middle-controls {
        flex-direction: row;
        padding-top: 0;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

        <span class="logo-text">Chronos <strong>Toolbox</strong></span>

        <span class="breadcrumb__sep">/</span>
